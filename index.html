<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>trung nguyen gay</title>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3356112593497100"
     crossorigin="anonymous"></script>
<style>
body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:black;
border:3px solid white;
margin-top:10px;
}

.controls{
margin-top:15px;
}

button{
width:70px;
height:50px;
font-size:20px;
margin:5px;
}
</style>
</head>

<body>

<h2>🐍 Snake Game</h2>
<p>Điểm: <span id="score">0</span></p>

<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
<br>
<button onclick="setDir('UP')">⬆</button>
<br>
<button onclick="setDir('LEFT')">⬅</button>
<button onclick="setDir('DOWN')">⬇</button>
<button onclick="setDir('RIGHT')">➡</button>
</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let box=20;
let snake=[{x:9*box,y:10*box}];
let direction;

let food={
x:Math.floor(Math.random()*19)*box,
y:Math.floor(Math.random()*19)*box
};

let score=0;

// điều khiển bằng bàn phím
document.addEventListener("keydown",function(e){

if(e.key==="ArrowLeft" && direction!=="RIGHT") direction="LEFT";
else if(e.key==="ArrowUp" && direction!=="DOWN") direction="UP";
else if(e.key==="ArrowRight" && direction!=="LEFT") direction="RIGHT";
else if(e.key==="ArrowDown" && direction!=="UP") direction="DOWN";

});

// điều khiển bằng nút
function setDir(dir){

if(dir==="LEFT" && direction!=="RIGHT") direction="LEFT";
if(dir==="UP" && direction!=="DOWN") direction="UP";
if(dir==="RIGHT" && direction!=="LEFT") direction="RIGHT";
if(dir==="DOWN" && direction!=="UP") direction="DOWN";

}

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,400,400);

for(let i=0;i<snake.length;i++){
ctx.fillStyle=i==0?"lime":"green";
ctx.fillRect(snake[i].x,snake[i].y,box,box);
}

ctx.fillStyle="red";
ctx.fillRect(food.x,food.y,box,box);

let snakeX=snake[0].x;
let snakeY=snake[0].y;

if(direction==="LEFT") snakeX-=box;
if(direction==="UP") snakeY-=box;
if(direction==="RIGHT") snakeX+=box;
if(direction==="DOWN") snakeY+=box;

if(snakeX===food.x && snakeY===food.y){

score++;
document.getElementById("score").innerText=score;

food={
x:Math.floor(Math.random()*19)*box,
y:Math.floor(Math.random()*19)*box
};

}else{
snake.pop();
}

let newHead={x:snakeX,y:snakeY};

if(
snakeX<0 || snakeY<0 ||
snakeX>=400 || snakeY>=400 ||
collision(newHead,snake)
){
clearInterval(game);
alert("may chet roi thg oc cac");
}

snake.unshift(newHead);

}

function collision(head,array){
for(let i=0;i<array.length;i++){
if(head.x===array[i].x && head.y===array[i].y){
return true;
}
}
return false;
}

let game=setInterval(draw,120);

</script>

</body>
</html>
